<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>燕京生活啟航站 - 像素冒險</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            image-rendering: pixelated;
        }

        @font-face {
            font-family: 'PixelFont';
            src: local('Courier New'), local('monospace');
        }

        :root {
            --pixel-border: 4px solid #2d2d2d;
            --pixel-shadow: 6px 6px 0px #1a1a1a;
            --bg-primary: #f5ede4;
            --bg-secondary: #e8ddd0;
            --text-dark: #2d2d2d;
        }

        body {
            background: #2d2d2d;
            font-family: 'Courier New', 'PixelFont', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 12px;
            margin: 0;
        }

        .game-wrapper {
            max-width: 1200px;
            width: 100%;
            background: var(--bg-primary);
            border: var(--pixel-border);
            box-shadow: var(--pixel-shadow);
            padding: 12px;
            position: relative;
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #2d2d2d;
            padding: 8px 16px;
            border-bottom: 4px solid #1a1a1a;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .game-header .title {
            color: #aaddaa;
            font-size: 1rem;
            letter-spacing: 1px;
            text-shadow: 2px 2px 0 #1a3a1a;
        }

        .game-header .status {
            color: #ddd;
            font-size: 0.7rem;
            background: #222;
            padding: 4px 12px;
            border: 2px solid #555;
        }

        .game-header .inventory {
            color: #ffd700;
            font-size: 0.7rem;
            background: #2a2a1a;
            padding: 4px 12px;
            border: 2px solid #887a3a;
            display: flex;
            gap: 6px;
            align-items: center;
            flex-wrap: wrap;
        }

        .game-header .inventory span {
            font-size: 1.1rem;
        }

        .game-screen {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            min-height: 600px;
        }

        .left-panel {
            flex: 0 0 45%;
            min-width: 280px;
            background: #b5d4e8;
            border: var(--pixel-border);
            box-shadow: inset 0 0 0 4px #d4e8f5;
            position: relative;
            overflow: hidden;
            aspect-ratio: 4 / 3;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .left-panel canvas {
            width: 100%;
            height: 100%;
            display: block;
            image-rendering: pixelated;
            background: #b5d4e8;
        }

        .right-panel {
            flex: 1;
            min-width: 260px;
            background: #f5ede4;
            border: var(--pixel-border);
            padding: 16px 18px;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: inset 0 0 0 4px #e8ddd0;
            max-height: 620px;
            overflow-y: auto;
        }

        .typewriter {
            font-family: 'Courier New', 'PixelFont', monospace;
            font-size: 0.95rem;
            line-height: 1.7;
            color: var(--text-dark);
            white-space: pre-wrap;
            word-break: break-word;
        }

        .typewriter .cursor-blink {
            display: inline-block;
            width: 10px;
            height: 1.1em;
            background: var(--text-dark);
            animation: blink 0.7s step-end infinite;
            vertical-align: text-bottom;
            margin-left: 2px;
        }

        @keyframes blink {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0;
            }
        }

        .pixel-btn {
            background: #d4c5b2;
            border: 4px solid #1a1a1a;
            box-shadow: 4px 4px 0 #0a0a0a;
            padding: 10px 20px;
            font-family: 'Courier New', 'PixelFont', monospace;
            font-size: 0.85rem;
            font-weight: bold;
            color: #1a1a1a;
            cursor: pointer;
            transition: all 0.05s linear;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: inline-block;
            text-align: center;
            min-width: 80px;
        }

        .pixel-btn:active {
            transform: translate(4px, 4px);
            box-shadow: none;
        }
        .pixel-btn:hover {
            background: #e0d4c4;
        }
        .pixel-btn.primary {
            background: #7ab87a;
            color: #f5f0e8;
            border-color: #2a5a2a;
            box-shadow: 4px 4px 0 #1a3a1a;
        }
        .pixel-btn.primary:hover {
            background: #8ac88a;
        }
        .pixel-btn.secondary {
            background: #7ab0c8;
            color: #f5f0e8;
            border-color: #2a4a5a;
            box-shadow: 4px 4px 0 #1a2a3a;
        }
        .pixel-btn.secondary:hover {
            background: #8ac0d8;
        }
        .pixel-btn.warning {
            background: #d4b84a;
            color: #1a1a1a;
            border-color: #7a6a2a;
            box-shadow: 4px 4px 0 #4a3a1a;
        }
        .pixel-btn.warning:hover {
            background: #e4c85a;
        }
        .pixel-btn:disabled {
            opacity: 0.4;
            transform: none;
            box-shadow: 4px 4px 0 #0a0a0a;
            cursor: not-allowed;
        }

        .option-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin: 12px 0 16px;
        }

        .option-btn {
            background: #f5ede4;
            border: 4px solid #2d2d2d;
            box-shadow: 4px 4px 0 #0a0a0a;
            padding: 12px 16px;
            font-family: 'Courier New', 'PixelFont', monospace;
            font-size: 0.85rem;
            text-align: left;
            cursor: pointer;
            transition: all 0.05s linear;
            color: #1a1a1a;
            line-height: 1.4;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .option-btn .label {
            background: #2d2d2d;
            color: #f5f0e8;
            padding: 2px 12px;
            font-weight: bold;
            font-size: 0.75rem;
            flex-shrink: 0;
            border: 2px solid #0a0a0a;
        }

        .option-btn:hover {
            background: #f5ede4;
            transform: scale(1.01);
        }

        .option-btn.selected {
            background: #d4e8f5;
            border-color: #4a7a9a;
            box-shadow: 2px 2px 0 #2a4a6a;
            transform: translate(2px, 2px);
        }

        .option-btn:active {
            transform: translate(4px, 4px);
            box-shadow: none;
        }

        .progress-area {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .progress-track {
            flex: 1;
            height: 20px;
            background: #d4c5b2;
            border: 3px solid #2d2d2d;
            box-shadow: inset 2px 2px 0 #b0a090;
            min-width: 80px;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: #7ab87a;
            border-right: 3px solid #2d2d2d;
            transition: width 0.15s linear;
        }

        .progress-text {
            font-size: 0.75rem;
            font-weight: bold;
            white-space: nowrap;
            background: #2d2d2d;
            color: #ddd;
            padding: 2px 12px;
            border: 2px solid #0a0a0a;
            letter-spacing: 0.5px;
        }

        /* 道具彈窗 - 置中放大 */
        .item-popup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            0% {
                opacity: 0;
            }
            100% {
                opacity: 1;
            }
        }

        .item-popup {
            background: #2d2d2d;
            border: 6px solid #ffd700;
            padding: 30px 40px;
            max-width: 440px;
            width: 90%;
            text-align: center;
            box-shadow: 0 0 60px rgba(255, 215, 0, 0.4);
            animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes popIn {
            0% {
                transform: scale(0.3);
                opacity: 0;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .item-popup .item-icon {
            font-size: 4rem;
            display: block;
            margin-bottom: 8px;
        }

        .item-popup .item-name {
            color: #ffd700;
            font-size: 1.5rem;
            font-weight: bold;
            font-family: 'Courier New', 'PixelFont', monospace;
        }

        .item-popup .item-desc {
            color: #ddd;
            font-size: 0.9rem;
            margin: 10px 0 16px;
            font-family: 'Courier New', 'PixelFont', monospace;
            line-height: 1.5;
        }

        .item-popup .pixel-btn {
            font-size: 0.8rem;
            padding: 10px 30px;
        }

        /* 角色自訂 */
        .customize-area {
            background: #e8ddd0;
            border: 4px solid #2d2d2d;
            padding: 12px 14px;
            margin: 8px 0;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
        }

        .customize-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
            align-items: center;
            background: #f5ede4;
            padding: 6px 10px;
            border: 3px solid #2d2d2d;
            flex: 1;
            min-width: 80px;
        }

        .customize-group label {
            font-size: 0.6rem;
            font-weight: bold;
            color: #2d2d2d;
        }

        .customize-group .options {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .customize-group .opt-btn {
            background: #d4c5b2;
            border: 3px solid #2d2d2d;
            padding: 4px 10px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.05s;
            font-family: 'Courier New', monospace;
            line-height: 1;
            font-weight: bold;
        }

        .customize-group .opt-btn.active {
            background: #7ab87a;
            border-color: #ffd700;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
            color: #fff;
        }

        .customize-group .opt-btn:hover {
            transform: scale(1.05);
        }

        /* 首頁 */
        #homePage .title-lg {
            font-size: 1.8rem;
            font-weight: bold;
            color: #1a1a1a;
            text-shadow: 4px 4px 0 #b8a090;
            margin-bottom: 6px;
            line-height: 1.3;
        }

        .name-input-area {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            margin: 10px 0;
        }

        .name-input-area input {
            flex: 1;
            min-width: 140px;
            padding: 10px 14px;
            font-family: 'Courier New', 'PixelFont', monospace;
            font-size: 0.95rem;
            border: 4px solid #2d2d2d;
            background: #fcf8f0;
            outline: none;
            box-shadow: inset 2px 2px 0 #b0a090;
        }

        .name-input-area input:focus {
            border-color: #4a7a9a;
        }

        /* 結果頁 */
        #resultPage .result-title {
            font-size: 1.3rem;
            font-weight: bold;
            border-bottom: 4px solid #2d2d2d;
            padding-bottom: 6px;
            margin-bottom: 8px;
        }

        .trait-bar-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin: 6px 0;
        }

        .trait-bar-row {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.7rem;
            font-weight: bold;
        }

        .trait-bar-row .tlabel {
            min-width: 44px;
            text-align: right;
            font-size: 0.6rem;
            color: #1a1a1a;
        }

        .trait-bar-row .tlabel.right {
            text-align: left;
            min-width: 44px;
        }

        .trait-bar-track {
            flex: 1;
            height: 24px;
            background: #d4c5b2;
            border: 3px solid #2d2d2d;
            position: relative;
            box-shadow: inset 2px 2px 0 #b0a090;
            min-width: 60px;
            display: flex;
        }

        .trait-bar-fill-left {
            height: 100%;
            background: #7ab0c8;
            border-right: 2px solid #2d2d2d;
            transition: width 0.4s;
            flex-shrink: 0;
        }

        .trait-bar-fill-right {
            height: 100%;
            background: #e8a86a;
            border-left: 2px solid #2d2d2d;
            transition: width 0.4s;
            flex-shrink: 0;
        }

        .trait-score {
            font-size: 0.6rem;
            min-width: 20px;
            text-align: center;
        }

        .proto-box {
            background: #e8ddd0;
            border: 4px solid #2d2d2d;
            padding: 12px 16px;
            margin: 8px 0;
            box-shadow: inset 0 0 0 4px #f5ede4;
        }

        .proto-box .proto-name {
            font-size: 1.2rem;
            font-weight: bold;
        }

        .proto-box .proto-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin: 6px 0;
        }

        .proto-box .proto-tags span {
            background: #2d2d2d;
            color: #f5f0e8;
            padding: 2px 12px;
            font-size: 0.6rem;
            border: 2px solid #0a0a0a;
        }

        .advice-block {
            background: #f5ede4;
            border: 3px solid #2d2d2d;
            padding: 8px 12px;
            margin: 4px 0;
            font-size: 0.78rem;
            border-left: 12px solid #7ab87a;
        }

        .advice-block h4 {
            font-size: 0.8rem;
            margin-bottom: 2px;
        }

        .answer-log {
            background: #f5ede4;
            border: 3px solid #2d2d2d;
            padding: 8px 12px;
            max-height: 140px;
            overflow-y: auto;
            font-size: 0.65rem;
            margin: 6px 0;
        }

        .answer-log .log-item {
            padding: 2px 0;
            border-bottom: 1px solid #d4c5b2;
        }
        .answer-log .log-item:last-child {
            border-bottom: none;
        }

        .result-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 8px 0;
            justify-content: center;
        }

        .result-actions .pixel-btn {
            font-size: 0.7rem;
            padding: 8px 14px;
            min-width: 90px;
        }

        .care-note {
            background: #f5d8d0;
            border: 4px solid #c45a5a;
            padding: 10px 14px;
            margin: 6px 0;
            font-size: 0.8rem;
            border-left: 12px solid #c45a5a;
        }

        .inventory-display {
            background: #e8ddd0;
            border: 4px solid #2d2d2d;
            padding: 10px 14px;
            margin: 6px 0;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
        }

        .inventory-display .item-badge {
            background: #2d2d2d;
            color: #ffd700;
            padding: 4px 10px;
            font-size: 0.7rem;
            border: 2px solid #ffd700;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .costume-unlock {
            background: #2d2d2d;
            border: 4px solid #ff6a6a;
            color: #ff6a6a;
            padding: 8px 16px;
            margin: 6px 0;
            font-size: 0.8rem;
            text-align: center;
            animation: popIn 0.6s ease;
        }

        .right-panel::-webkit-scrollbar {
            width: 10px;
        }
        .right-panel::-webkit-scrollbar-track {
            background: #d4c5b2;
            border: 2px solid #2d2d2d;
        }
        .right-panel::-webkit-scrollbar-thumb {
            background: #8a7a6a;
            border: 2px solid #2d2d2d;
        }

        @media (max-width: 760px) {
            .left-panel {
                flex: 1 1 100%;
                aspect-ratio: 16 / 9;
                min-height: 180px;
            }
            .right-panel {
                flex: 1 1 100%;
                max-height: 460px;
            }
            .game-wrapper {
                padding: 8px;
            }
            .game-header .title {
                font-size: 0.75rem;
            }
            #homePage .title-lg {
                font-size: 1.2rem;
            }
            .option-btn {
                font-size: 0.75rem;
                padding: 8px 10px;
            }
            .customize-area {
                flex-direction: column;
                align-items: stretch;
            }
            .customize-group {
                min-width: 60px;
            }
            .trait-bar-row {
                font-size: 0.55rem;
            }
            .item-popup {
                padding: 20px;
                max-width: 320px;
            }
            .item-popup .item-icon {
                font-size: 3rem;
            }
            .item-popup .item-name {
                font-size: 1.2rem;
            }
        }

        @media print {
            body {
                background: white;
                padding: 0;
            }
            .game-wrapper {
                box-shadow: none;
                border: 2px solid #000;
                padding: 8px;
            }
            .left-panel {
                display: none;
            }
            .right-panel {
                flex: 1 1 100%;
                max-height: none;
                overflow: visible;
            }
            .pixel-btn {
                display: none;
            }
            .game-header .status {
                display: none;
            }
            .game-header .inventory {
                display: none;
            }
            .result-actions .pixel-btn {
                display: none;
            }
            .option-btn {
                border: 2px solid #000;
                box-shadow: none;
            }
            .option-btn.selected {
                background: #d4e8f5;
            }
            .progress-area {
                display: none;
            }
            .item-popup-overlay {
                display: none !important;
            }
            .costume-unlock {
                display: none;
            }
        }
    </style>
</head>
<body>

    <div class="game-wrapper" id="app">
        <div class="game-header">
            <span class="title">🎮 燕京生活啟航站</span>
            <span class="status" id="headerStatus">🏫 中華基督教會燕京書院</span>
            <div class="inventory">🎒 道具: <span id="itemDisplay">-</span></div>
        </div>

        <div class="game-screen">
            <div class="left-panel">
                <canvas id="pixelCanvas" width="640" height="480"></canvas>
            </div>
            <div class="right-panel" id="rightPanel">
                <div id="dynamicContent"></div>
            </div>
        </div>
    </div>

    <script>
        // ================================================================
        //  1. 題庫 (10題)
        // ================================================================
        const QUESTIONS = [{
            id: 1,
            stage: '中一',
            scene: 'classroom',
            text: '升上中一，班上沒有小學同學。開學第一週你會怎麼做？',
            options: [
                { label: 'A', text: '認為問題不大，主動打招呼便會認識到新朋友。', scores: { 安全感: 4, 規劃性: 2 }, item: { icon: '🤝',
                        name: '友誼之手', desc: '你主動伸出友誼之手，獲得新朋友嘅信任！' } },
                { label: 'B', text: '認為隨遇而安便好，開學後自然會認識到新朋友。', scores: { 安全感: 4, 隨興性: 2 }, item: { icon: '🌊',
                        name: '隨波逐流', desc: '你選擇順其自然，獲得一顆隨遇而安嘅心！' } },
                { label: 'C', text: '決定報名多項課外活動，認為參與活動是認識好朋友的機會。', scores: { 冒險感: 4, 規劃性: 2 }, item: { icon: '📋',
                        name: '活動日程', desc: '你積極參與課外活動，獲得豐富嘅校園生活！' } },
                { label: 'D', text: '誰坐隔壁就跟誰聊。', scores: { 冒險感: 4, 隨興性: 2 }, item: { icon: '💬', name: '即興對話',
                        desc: '你隨興與鄰座聊天，獲得意想不到嘅新朋友！' } }
            ]
        }, {
            id: 2,
            stage: '中一',
            scene: 'camp',
            text: '歷險營教練出了一個超難的解謎關卡，你會？',
            options: [
                { label: 'A', text: '專心研究規則，自己破解。', scores: { 學習力: 4, 顧己: 2 }, item: { icon: '🧠', name: '智慧之光',
                        desc: '你靠自己的力量破解謎題，獲得智慧的肯定！' } },
                { label: 'B', text: '專心研究規則，和同學互相討論可行性。', scores: { 學習力: 4, 利他: 2 }, item: { icon: '🤝',
                        name: '合作橋樑', desc: '你與同學合作破解謎題，獲得團隊合作嘅力量！' } },
                { label: 'C', text: '突然有個天馬行空的點子！自己破解。', scores: { 創造力: 4, 顧己: 2 }, item: { icon: '💡',
                        name: '靈感火花', desc: '你天馬行空嘅創意，獲得靈感嘅火花！' } },
                { label: 'D', text: '突然有個天馬行空的點子！和同學互相討論可行性。', scores: { 創造力: 4, 利他: 2 }, item: { icon: '🌟',
                        name: '創意之星', desc: '你與同學分享創意，獲得閃耀嘅創意之星！' } }
            ]
        }, {
            id: 3,

        // ---- 角色繪製 ----
        function drawCharacter(ctx, x, y, frame) {
            const gender = state.gender || 'boy';
            const outfit = state.outfit || 'summer';

            const scale = 2.2;
            const bx = x - 18 * scale;
            const by = y - 36 * scale;

            // 陰影
            ctx.fillStyle = 'rgba(0,0,0,0.12)';
            ctx.beginPath();
            ctx.ellipse(x, y + 14, 26 * scale, 8, 0, 0, Math.PI * 2);
            ctx.fill();

            // 身體
            let shirtColor, pantsColor;
            if (outfit === 'summer') {
                if (gender === 'boy') {
                    shirtColor = '#f5f0e8';
                    pantsColor = '#6a8ab5';
                } else {
                    shirtColor = '#6a8ab5';
                    pantsColor = '#6a8ab5';
                }
            } else if (outfit === 'winter') {
                shirtColor = '#2d2d2d';
                pantsColor = '#1a1a1a';
            } else if (outfit === 'sport') {
                shirtColor = '#e88d4a';
                pantsColor = '#4a6a9a';
            } else if (outfit === 'scout') {
                shirtColor = '#4a7a3a';
                pantsColor = '#3a5a2a';
            } else if (outfit === 'stjohn') {
                shirtColor = '#c45a5a';
                pantsColor = '#2d2d2d';
            } else {
                shirtColor = '#f5f0e8';
                pantsColor = '#4a6a8a';
            }

            ctx.fillStyle = shirtColor;
            ctx.fillRect(bx + 8 * scale, by + 18 * scale, 24 * scale, 22 * scale);
            if (gender === 'girl' && outfit === 'summer') {
                ctx.fillStyle = '#6a8ab5';
                ctx.fillRect(bx + 8 * scale, by + 38 * scale, 24 * scale, 14 * scale);
                ctx.fillRect(bx + 4 * scale, by + 40 * scale, 32 * scale, 6 * scale);
            } else {
                ctx.fillStyle = pantsColor;
                ctx.fillRect(bx + 8 * scale, by + 38 * scale, 10 * scale, 16 * scale);
                ctx.fillRect(bx + 22 * scale, by + 38 * scale, 10 * scale, 16 * scale);
            }

            // 領帶/領結
            if (outfit === 'winter') {
                ctx.fillStyle = '#4a4a6a';
                ctx.fillRect(bx + 17 * scale, by + 18 * scale, 6 * scale, 14 * scale);
                ctx.fillRect(bx + 14 * scale, by + 16 * scale, 12 * scale, 6 * scale);
            }

            // 頭
            ctx.fillStyle = '#f5d0b0';
            ctx.fillRect(bx + 8 * scale, by - 2 * scale, 24 * scale, 20 * scale);

            // 頭髮 (黑色短髮)
            ctx.fillStyle = '#1a1a1a';
            ctx.fillRect(bx + 4 * scale, by - 6 * scale, 32 * scale, 8 * scale);
            ctx.fillRect(bx + 2 * scale, by + 2 * scale, 6 * scale, 8 * scale);
            ctx.fillRect(bx + 32 * scale, by + 2 * scale, 6 * scale, 8 * scale);
            if (gender === 'girl') {
                ctx.fillRect(bx + 2 * scale, by + 8 * scale, 4 * scale, 8 * scale);
                ctx.fillRect(bx + 34 * scale, by + 8 * scale, 4 * scale, 8 * scale);
            }

            // 眼睛
            ctx.fillStyle = '#f5f0e8';
            ctx.fillRect(bx + 10 * scale, by + 6 * scale, 8 * scale, 8 * scale);
            ctx.fillRect(bx + 22 * scale, by + 6 * scale, 8 * scale, 8 * scale);
            ctx.fillStyle = '#1a1a1a';
            const eyeOff = Math.sin(frame * 0.04) * 1.5;
            ctx.fillRect(bx + 12 * scale + eyeOff, by + 8 * scale, 4 * scale, 4 * scale);
            ctx.fillRect(bx + 24 * scale + eyeOff, by + 8 * scale, 4 * scale, 4 * scale);

            // 嘴
            ctx.fillStyle = '#c45a5a';
            ctx.fillRect(bx + 14 * scale, by + 16 * scale, 12 * scale, 3 * scale);

            // 手臂
            const armSwing = Math.sin(frame * 0.08) * 6 * scale;
            ctx.fillStyle = '#f5d0b0';
            ctx.fillRect(bx - 2 * scale, by + 20 * scale + armSwing, 8 * scale, 14 * scale);
            ctx.fillRect(bx + 34 * scale, by + 20 * scale - armSwing, 8 * scale, 14 * scale);

            // 腳
            const legOff = Math.sin(frame * 0.1) * 4 * scale;
            ctx.fillStyle = '#2d2d2d';
            ctx.fillRect(bx + 8 * scale, by + 54 * scale + legOff, 8 * scale, 10 * scale);
            ctx.fillRect(bx + 24 * scale, by + 54 * scale - legOff, 8 * scale, 10 * scale);

            // 書包
            if (state.page === 'quiz' || state.page === 'home') {
                ctx.fillStyle = '#5a3a2a';
                ctx.fillRect(bx + 28 * scale, by + 20 * scale, 10 * scale, 20 * scale);
                ctx.fillRect(bx + 26 * scale, by + 18 * scale, 14 * scale, 6 * scale);
                ctx.fillStyle = '#4a2a1a';
                ctx.fillRect(bx + 30 * scale, by + 24 * scale, 6 * scale, 12 * scale);
            }
        }

        // ================================================================

        function showItemPopup(item, callback) {
            const overlay = document.createElement('div');
            overlay.className = 'item-popup-overlay';
            overlay.innerHTML = `
                <div class="item-popup">
                    <span class="item-icon">${item.icon}</span>
                    <div class="item-name">✦ ${item.name} ✦</div>
                    <div class="item-desc">${item.desc}</div>
                    <button class="pixel-btn primary" id="popupConfirmBtn">繼續 ➜</button>
                </div>
            `;
            document.body.appendChild(overlay);

            document.getElementById('popupConfirmBtn').addEventListener('click', () => {
                overlay.remove();
                if (callback) callback();
            });

            // 點擊背景也可關閉
            overlay.addEventListener('click', (e) => {
                if (e.target === overlay) {
                    overlay.remove();
                    if (callback) callback();
                }
            });
        }

        // ================================================================
        //  8. 打字機效果
        // ================================================================
        function typeWriter(element, text, speed = 50, callback) {
            if (state.isTyping) {
                clearTimeout(state.typeTimer);
                state.isTyping = false;
            }
            state.isTyping = true;
            let index = 0;
            element.textContent = '';
            element.style.visibility = 'visible';

            function typeChar() {
                if (index < text.length) {
                    element.textContent += text.charAt(index);
                    index++;
                    rightPanel.scrollTop = rightPanel.scrollHeight;
                    state.typeTimer = setTimeout(typeChar, speed);
                } else {
                    state.isTyping = false;
                    element.innerHTML += '<span class="cursor-blink"></span>';
                    if (callback) callback();
                }
            }
            typeChar();
        }

        function stopTyping() {
            if (state.typeTimer) {
                clearTimeout(state.typeTimer);
                state.typeTimer = null;
            }
            state.isTyping = false;
        }

        function renderQuestion(index) {

                    </div>

            // 打字機效果 (只打題目)
            const qTextEl = document.getElementById('questionText');

            // 選項點擊

            document.getElementById('prevBtn').addEventListener('click', () => {

                    if (state.items.length > 0) state.items.pop();
                    renderQuestion(index - 1);

            document.getElementById('nextBtn').addEventListener('click', () => {
                if (state.answers[index].optionIndex === null) {
                    alert('請先選擇一個選項！ 😊');

                // 獲得道具

        // ================================================================

        function showResult() {
            state.page = 'result';

            const rawScores = {};
            const allTraits = ['安全感', '冒險感', '學習力', '創造力', '規劃性', '隨興性', '朋友為重', '家庭為重', '顧己', '利他'];
            allTraits.forEach(t => rawScores[t] = 0);

            state.answers.forEach(ans => {
                if (ans.optionIndex !== null) {
                    for (let key in ans.scores) {
                        rawScores[key] += ans.scores[key];
                    }
                }
            });

            const finalScores = {};
            TRAIT_PAIRS.forEach(pair => {
                const left = pair.left,
                    right = pair.right;
                let leftTotal = 0,
                    rightTotal = 0;
                const qIndices = TRAIT_QUESTIONS[left] || [];
                qIndices.forEach(qi => {
                    const ans = state.answers[qi];
                    if (ans.optionIndex !== null) {
                        const scores = ans.scores;
                        if (scores[left]) leftTotal += scores[left];
                        if (scores[right]) rightTotal += scores[right];
                    }
                });
                const sum = leftTotal + rightTotal;
                if (sum === 0) {
                    finalScores[left] = 8;
                    finalScores[right] = 8;
                } else {
                    finalScores[left] = Math.round((leftTotal / sum) * 16);
                    finalScores[right] = 16 - finalScores[left];
                }
                finalScores[left] = Math.max(0, Math.min(16, finalScores[left]));
                finalScores[right] = 16 - finalScores[left];

            allTraits.forEach(t => { if (!(t in finalScores)) finalScores[t] = 8; });

        // ================================================================
        //  11. 原型配對
        // ================================================================
        function getPrototype(scores) {
            const s = scores;
            const rules = [
                { id: '穩健型學霸', check: () => s.安全感 >= 12 && s.學習力 >= 12 && s.規劃性 >= 12 },
                { id: '冒險型創作者', check: () => s.冒險感 >= 12 && s.創造力 >= 12 && s.隨興性 >= 10 },
                { id: '平衡型協調者', check: () => {
                        const vals = Object.values(s);
                        const avg = vals.reduce((a, b) => a + b, 0) / vals.length;
                        return vals.every(v => v >= 5 && v <= 11) && avg >= 6 && avg <= 10;
                    } },
                { id: '保守型跟隨者', check: () => s.安全感 >= 12 && s.顧己 >= 10 && s.家庭為重 >= 10 },
                { id: '衝動型行動派', check: () => s.冒險感 >= 12 && s.隨興性 >= 10 && s.朋友為重 >= 10 },
                { id: '完美型規劃師', check: () => s.規劃性 >= 12 && s.學習力 >= 10 && s.顧己 >= 10 },
                { id: '熱血型助人者', check: () => s.利他 >= 12 && s.冒險感 >= 10 && s.朋友為重 >= 10 },
                { id: '依賴型乖寶寶', check: () => s.安全感 >= 12 && s.家庭為重 >= 12 && s.冒險感 <= 6 },
            ];
            for (let rule of rules) {
                if (rule.check()) {
                    const found = PROTOTYPES.find(p => p.id === rule.id);
                    if (found) return found;
                }
            }
            const sorted = Object.entries(s).sort((a, b) => b[1] - a[1]);
            const top = sorted[0][0];
            const fallbackMap = {
                '安全感': '保守型跟隨者',
                '學習力': '穩健型學霸',
                '規劃性': '完美型規劃師',
                '家庭為重': '依賴型乖寶寶',
                '冒險感': '冒險型創作者',
                '創造力': '冒險型創作者',
                '朋友為重': '衝動型行動派',
                '利他': '熱血型助人者',
                '顧己': '保守型跟隨者',
                '隨興性': '衝動型行動派'
            };
            const fallbackId = fallbackMap[top] || '平衡型協調者';
            return PROTOTYPES.find(p => p.id === fallbackId) || PROTOTYPES[2];
        }

        // ================================================================
        //  12. Google Drive 儲存
        // ================================================================
        function saveToGoogleDrive() {
            const data = {
                name: state.studentName,
                scores: {},
                prototype: '',
                answers: state.answers.map((a, idx) => {
                    const q = QUESTIONS[idx];
                    return {
                        qId: q.id,
                        question: q.text.substring(0, 30) + '...',
                        option: a.optionIndex !== null ? q.options[a.optionIndex].label : '未答',
                        text: a.optionIndex !== null ? q.options[a.optionIndex].text : ''
                    };
                }),
                items: state.items.map(i => i.name),
                unlockedCostumes: state.unlockedCostumes,
                timestamp: new Date().toISOString()
            };

            const finalScores = {};
            TRAIT_PAIRS.forEach(pair => {
                const left = pair.left,
                    right = pair.right;
                let leftTotal = 0,
                    rightTotal = 0;
                const qIndices = TRAIT_QUESTIONS[left] || [];
                qIndices.forEach(qi => {
                    const ans = state.answers[qi];
                    if (ans.optionIndex !== null) {
                        const scores = ans.scores;
                        if (scores[left]) leftTotal += scores[left];
                        if (scores[right]) rightTotal += scores[right];
                    }
                });
                const sum = leftTotal + rightTotal;
                if (sum === 0) {
                    finalScores[left] = 8;
                    finalScores[right] = 8;
                } else {
                    finalScores[left] = Math.round((leftTotal / sum) * 16);
                    finalScores[right] = 16 - finalScores[left];
                }
                finalScores[left] = Math.max(0, Math.min(16, finalScores[left]));
                finalScores[right] = 16 - finalScores[left];
            });
            data.scores = finalScores;
            const proto = getPrototype(finalScores);
            data.prototype = proto.id;

            fetch(GOOGLE_APPS_SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            }).then(() => {
                alert('✅ 數據已成功儲存到 Google Drive！');
            }).catch((err) => {
                console.error('儲存失敗:', err);
                alert('⚠️ 儲存失敗，請檢查網絡連線。');
            });
        }

        // ================================================================
        //  13. 重置 & 動畫
        // ================================================================
        function resetAll() {
            state.currentQ = 0;
            state.answers = QUESTIONS.map((q) => ({ qId: q.id, optionIndex: null, scores: {} }));
            state.items = [];
            state.unlockedCostumes = [];
            state.studentName = '';
            state.page = 'home';
            stopTyping();
            if (state.animId) cancelAnimationFrame(state.animId);
            itemDisplay.textContent = '-';
            renderHome();
            headerStatus.textContent = '🏫 中華基督教會燕京書院';
        }

        function animateScene(stage) {
            let frame = 0;

            function tick() {
                frame++;
                state.sceneFrame = frame;
                if (state.isJumping) {
                    state.jumpFrame++;
                    if (state.jumpFrame > 60) {
                        state.isJumping = false;
                        state.jumpFrame = 0;
                    }
                }
                drawScene(stage, frame);
                state.animId = requestAnimationFrame(tick);
            }
            tick();
        }

        // ================================================================
        //  14. 啟動
        // ================================================================
        renderHome();

        document.addEventListener('keydown', (e) => {
            if (e.key === 'r' || e.key === 'R') {
                if (state.page === 'result') {
                    if (confirm('重新測驗？')) resetAll();
                }
            }
        });

        console.log('🎮 燕京生活啟航站 v4.0 已啟動！');
        console.log('📋 共 ' + QUESTIONS.length + ' 條題目，8 種性格原型');
        console.log('🎨 全新 Everskies 明亮粉彩風格，每場景 30+ 元素');
        console.log('⌨️ 快捷鍵: 1-4 選項, Enter 下一題, R 重新測驗');
    </script>
