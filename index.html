<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>燕京生活啟航站 - 像素冒險</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <!-- 引入 html2canvas 和 jsPDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js">
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js">
    </script>
    <style>
        /* ===== 所有樣式保持不變 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            image-rendering: pixelated;
        }

        @font-face {
            font-family: 'PixelFont';
            src: local('Courier New'), local('monospace');
        }

        :root {
            --pixel-border: 4px solid #2d2d2d;
            --pixel-shadow: 6px 6px 0px #1a1a1a;
            --bg-primary: #f5ede4;
            --bg-secondary: #e8ddd0;
            --text-dark: #2d2d2d;
        }

        body {
            background: #2d2d2d;
            font-family: 'Courier New', 'PixelFont', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 12px;
            margin: 0;
        }

        .game-wrapper {
            max-width: 1200px;
            width: 100%;
            background: var(--bg-primary);
            border: var(--pixel-border);
            box-shadow: var(--pixel-shadow);
            padding: 12px;
            position: relative;
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #2d2d2d;
            padding: 8px 16px;
            border-bottom: 4px solid #1a1a1a;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .game-header .title {
            color: #aaddaa;
            font-size: 1rem;
            letter-spacing: 1px;
            text-shadow: 2px 2px 0 #1a3a1a;
        }

        .game-header .status {
            color: #ddd;
            font-size: 0.7rem;
            background: #222;
            padding: 4px 12px;
            border: 2px solid #555;
        }

        .game-header .inventory {
            color: #ffd700;
            font-size: 0.7rem;
            background: #2a2a1a;
            padding: 4px 12px;
            border: 2px solid #887a3a;
            display: flex;
            gap: 6px;
            align-items: center;
            flex-wrap: wrap;
        }

        .game-header .inventory span {
            font-size: 1.1rem;
        }

        .game-screen {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            min-height: 600px;
        }

        .left-panel {
            flex: 0 0 45%;
            min-width: 280px;
            background: #b5d4e8;
            border: var(--pixel-border);
            box-shadow: inset 0 0 0 4px #d4e8f5;
            position: relative;
            overflow: hidden;
            aspect-ratio: 4 / 3;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .left-panel canvas {
            width: 100%;
            height: 100%;
            display: block;
            image-rendering: pixelated;
            background: #b5d4e8;
        }

        .right-panel {
            flex: 1;
            min-width: 260px;
            background: #f5ede4;
            border: var(--pixel-border);
            padding: 16px 18px;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: inset 0 0 0 4px #e8ddd0;
            max-height: 620px;
            overflow-y: auto;
        }

        .typewriter {
            font-family: 'Courier New', 'PixelFont', monospace;
            font-size: 0.95rem;
            line-height: 1.7;
            color: var(--text-dark);
            white-space: pre-wrap;
            word-break: break-word;
        }

        .typewriter .cursor-blink {
            display: inline-block;
            width: 10px;
            height: 1.1em;
            background: var(--text-dark);
            animation: blink 0.7s step-end infinite;
            vertical-align: text-bottom;
            margin-left: 2px;
        }

        @keyframes blink {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0;
            }
        }

        .pixel-btn {
            background: #d4c5b2;
            border: 4px solid #1a1a1a;
            box-shadow: 4px 4px 0 #0a0a0a;
            padding: 10px 20px;
            font-family: 'Courier New', 'PixelFont', monospace;
            font-size: 0.85rem;
            font-weight: bold;
            color: #1a1a1a;
            cursor: pointer;
            transition: all 0.05s linear;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: inline-block;
            text-align: center;
            min-width: 80px;
        }

        .pixel-btn:active {
            transform: translate(4px, 4px);
            box-shadow: none;
        }
        .pixel-btn:hover {
            background: #e0d4c4;
        }
        .pixel-btn.primary {
            background: #7ab87a;
            color: #f5f0e8;
            border-color: #2a5a2a;
            box-shadow: 4px 4px 0 #1a3a1a;
        }
        .pixel-btn.primary:hover {
            background: #8ac88a;
        }
        .pixel-btn.secondary {
            background: #7ab0c8;
            color: #f5f0e8;
            border-color: #2a4a5a;
            box-shadow: 4px 4px 0 #1a2a3a;
        }
        .pixel-btn.secondary:hover {
            background: #8ac0d8;
        }
        .pixel-btn.warning {
            background: #d4b84a;
            color: #1a1a1a;
            border-color: #7a6a2a;
            box-shadow: 4px 4px 0 #4a3a1a;
        }
        .pixel-btn.warning:hover {
            background: #e4c85a;
        }
        .pixel-btn:disabled {
            opacity: 0.4;
            transform: none;
            box-shadow: 4px 4px 0 #0a0a0a;
            cursor: not-allowed;
        }

        .option-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin: 12px 0 16px;
        }

        .option-btn {
            background: #f5ede4;
            border: 4px solid #2d2d2d;
            box-shadow: 4px 4px 0 #0a0a0a;
            padding: 12px 16px;
            font-family: 'Courier New', 'PixelFont', monospace;
            font-size: 0.85rem;
            text-align: left;
            cursor: pointer;
            transition: all 0.05s linear;
            color: #1a1a1a;
            line-height: 1.4;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .option-btn .label {
            background: #2d2d2d;
            color: #f5f0e8;
            padding: 2px 12px;
            font-weight: bold;
            font-size: 0.75rem;
            flex-shrink: 0;
            border: 2px solid #0a0a0a;
        }

        .option-btn:hover {
            background: #f5ede4;
            transform: scale(1.01);
        }

        .option-btn.selected {
            background: #d4e8f5;
            border-color: #4a7a9a;
            box-shadow: 2px 2px 0 #2a4a6a;
            transform: translate(2px, 2px);
        }

        .option-btn:active {
            transform: translate(4px, 4px);
            box-shadow: none;
        }

        .progress-area {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .progress-track {
            flex: 1;
            height: 20px;
            background: #d4c5b2;
            border: 3px solid #2d2d2d;
            box-shadow: inset 2px 2px 0 #b0a090;
            min-width: 80px;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: #7ab87a;
            border-right: 3px solid #2d2d2d;
            transition: width 0.15s linear;
        }

        .progress-text {
            font-size: 0.75rem;
            font-weight: bold;
            white-space: nowrap;
            background: #2d2d2d;
            color: #ddd;
            padding: 2px 12px;
            border: 2px solid #0a0a0a;
            letter-spacing: 0.5px;
        }

        /* 道具彈窗 - 置中放大 */
        .item-popup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            0% {
                opacity: 0;
            }
            100% {
                opacity: 1;
            }
        }

        .item-popup {
            background: #2d2d2d;
            border: 6px solid #ffd700;
            padding: 30px 40px;
            max-width: 440px;
            width: 90%;
            text-align: center;
            box-shadow: 0 0 60px rgba(255, 215, 0, 0.4);
            animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes popIn {
            0% {
                transform: scale(0.3);
                opacity: 0;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .item-popup .item-icon {
            font-size: 4rem;
            display: block;
            margin-bottom: 8px;
        }

        .item-popup .item-name {
            color: #ffd700;
            font-size: 1.5rem;
            font-weight: bold;
            font-family: 'Courier New', 'PixelFont', monospace;
        }

        .item-popup .item-desc {
            color: #ddd;
            font-size: 0.9rem;
            margin: 10px 0 16px;
            font-family: 'Courier New', 'PixelFont', monospace;
            line-height: 1.5;
        }

        .item-popup .pixel-btn {
            font-size: 0.8rem;
            padding: 10px 30px;
        }

        /* 角色自訂 */
        .customize-area {
            background: #e8ddd0;
            border: 4px solid #2d2d2d;
            padding: 12px 14px;
            margin: 8px 0;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
        }

        .customize-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
            align-items: center;
            background: #f5ede4;
            padding: 6px 10px;
            border: 3px solid #2d2d2d;
            flex: 1;
            min-width: 80px;
        }

        .customize-group label {
            font-size: 0.6rem;
            font-weight: bold;
            color: #2d2d2d;
        }

        .customize-group .options {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .customize-group .opt-btn {
            background: #d4c5b2;
            border: 3px solid #2d2d2d;
            padding: 4px 10px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.05s;
            font-family: 'Courier New', monospace;
            line-height: 1;
            font-weight: bold;
        }

        .customize-group .opt-btn.active {
            background: #7ab87a;
            border-color: #ffd700;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
            color: #fff;
        }

        .customize-group .opt-btn:hover {
            transform: scale(1.05);
        }

        /* 首頁 */
        #homePage .title-lg {
            font-size: 1.8rem;
            font-weight: bold;
            color: #1a1a1a;
            text-shadow: 4px 4px 0 #b8a090;
            margin-bottom: 6px;
            line-height: 1.3;
        }

        .name-input-area {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            margin: 10px 0;
        }

        .name-input-area input {
            flex: 1;
            min-width: 140px;
            padding: 10px 14px;
            font-family: 'Courier New', 'PixelFont', monospace;
            font-size: 0.95rem;
            border: 4px solid #2d2d2d;
            background: #fcf8f0;
            outline: none;
            box-shadow: inset 2px 2px 0 #b0a090;
        }

        .name-input-area input:focus {
            border-color: #4a7a9a;
        }

        /* 結果頁 */
        #resultPage .result-title {
            font-size: 1.3rem;
            font-weight: bold;
            border-bottom: 4px solid #2d2d2d;
            padding-bottom: 6px;
            margin-bottom: 8px;
        }

        .trait-bar-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin: 6px 0;
        }

        .trait-bar-row {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.7rem;
            font-weight: bold;
        }

        .trait-bar-row .tlabel {
            min-width: 44px;
            text-align: right;
            font-size: 0.6rem;
            color: #1a1a1a;
        }

        .trait-bar-row .tlabel.right {
            text-align: left;
            min-width: 44px;
        }

        .trait-bar-track {
            flex: 1;
            height: 24px;
            background: #d4c5b2;
            border: 3px solid #2d2d2d;
            position: relative;
            box-shadow: inset 2px 2px 0 #b0a090;
            min-width: 60px;
            display: flex;
        }

        .trait-bar-fill-left {
            height: 100%;
            background: #7ab0c8;
            border-right: 2px solid #2d2d2d;
            transition: width 0.4s;
            flex-shrink: 0;
        }

        .trait-bar-fill-right {
            height: 100%;
            background: #e8a86a;
            border-left: 2px solid #2d2d2d;
            transition: width 0.4s;
            flex-shrink: 0;
        }

        .trait-score {
            font-size: 0.6rem;
            min-width: 20px;
            text-align: center;
        }

        .proto-box {
            background: #e8ddd0;
            border: 4px solid #2d2d2d;
            padding: 12px 16px;
            margin: 8px 0;
            box-shadow: inset 0 0 0 4px #f5ede4;
        }

        .proto-box .proto-name {
            font-size: 1.2rem;
            font-weight: bold;
        }

        .proto-box .proto-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin: 6px 0;
        }

        .proto-box .proto-tags span {
            background: #2d2d2d;
            color: #f5f0e8;
            padding: 2px 12px;
            font-size: 0.6rem;
            border: 2px solid #0a0a0a;
        }

        .advice-block {
            background: #f5ede4;
            border: 3px solid #2d2d2d;
            padding: 8px 12px;
            margin: 4px 0;
            font-size: 0.78rem;
            border-left: 12px solid #7ab87a;
        }

        .advice-block h4 {
            font-size: 0.8rem;
            margin-bottom: 2px;
        }

        .answer-log {
            background: #f5ede4;
            border: 3px solid #2d2d2d;
            padding: 8px 12px;
            max-height: 140px;
            overflow-y: auto;
            font-size: 0.65rem;
            margin: 6px 0;
        }

        .answer-log .log-item {
            padding: 2px 0;
            border-bottom: 1px solid #d4c5b2;
        }
        .answer-log .log-item:last-child {
            border-bottom: none;
        }

        .result-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 8px 0;
            justify-content: center;
        }

        .result-actions .pixel-btn {
            font-size: 0.7rem;
            padding: 8px 14px;
            min-width: 90px;
        }

        .care-note {
            background: #f5d8d0;
            border: 4px solid #c45a5a;
            padding: 10px 14px;
            margin: 6px 0;
            font-size: 0.8rem;
            border-left: 12px solid #c45a5a;
        }

        .inventory-display {
            background: #e8ddd0;
            border: 4px solid #2d2d2d;
            padding: 10px 14px;
            margin: 6px 0;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
        }

        .inventory-display .item-badge {
            background: #2d2d2d;
            color: #ffd700;
            padding: 4px 10px;
            font-size: 0.7rem;
            border: 2px solid #ffd700;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .costume-unlock {
            background: #2d2d2d;
            border: 4px solid #ff6a6a;
            color: #ff6a6a;
            padding: 8px 16px;
            margin: 6px 0;
            font-size: 0.8rem;
            text-align: center;
            animation: popIn 0.6s ease;
        }

        .right-panel::-webkit-scrollbar {
            width: 10px;
        }
        .right-panel::-webkit-scrollbar-track {
            background: #d4c5b2;
            border: 2px solid #2d2d2d;
        }
        .right-panel::-webkit-scrollbar-thumb {
            background: #8a7a6a;
            border: 2px solid #2d2d2d;
        }

        /* ===== 截圖專用容器 (隱藏，僅用於渲染) ===== */
        #captureContainer {
            position: fixed;
            top: -9999px;
            left: -9999px;
            width: 800px;
            background: #f5ede4;
            padding: 30px;
            font-family: 'Courier New', 'PixelFont', monospace;
            z-index: 9999;
            border: 8px solid #2d2d2d;
        }

        #captureContainer .capture-inner {
            max-width: 100%;
            background: white;
            padding: 30px;
        }

        #captureContainer .capture-header {
            text-align: center;
            border-bottom: 4px solid #2d2d2d;
            padding-bottom: 16px;
            margin-bottom: 20px;
        }

        #captureContainer .capture-header h1 {
            font-size: 2rem;
            margin: 0;
        }

        #captureContainer .capture-header .sub {
            font-size: 0.9rem;
            color: #666;
        }

        #captureContainer .capture-body {
            display: flex;
            flex-wrap: wrap;
            gap: 24px;
        }

        #captureContainer .capture-left {
            flex: 0 0 42%;
            min-width: 200px;
        }

        #captureContainer .capture-left .pixel-img {
            width: 100%;
            border: 4px solid #2d2d2d;
            image-rendering: pixelated;
            background: #b5d4e8;
        }

        #captureContainer .capture-right {
            flex: 1;
            min-width: 200px;
        }

        #captureContainer .capture-right .proto-block {
            background: #e8ddd0;
            padding: 12px 16px;
            border: 4px solid #2d2d2d;
            margin-bottom: 12px;
        }

        #captureContainer .capture-right .proto-block .pname {
            font-size: 1.2rem;
            font-weight: bold;
        }

        #captureContainer .capture-right .proto-block .ptags {
            font-size: 0.7rem;
            margin: 4px 0;
        }

        #captureContainer .capture-right .proto-block .pdesc {
            font-size: 0.75rem;
        }

        #captureContainer .capture-right .trait-block {
            background: #f5ede4;
            border: 4px solid #2d2d2d;
            padding: 8px 12px;
        }

        #captureContainer .capture-right .trait-block .tlabel {
            font-weight: bold;
            font-size: 0.8rem;
            margin-bottom: 4px;
        }

        #captureContainer .capture-right .trait-row {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.65rem;
            margin: 3px 0;
        }

        #captureContainer .capture-right .trait-row .tbar {
            flex: 1;
            height: 14px;
            background: #d4c5b2;
            border: 2px solid #2d2d2d;
            display: flex;
        }

        #captureContainer .capture-right .trait-row .tbar .l {
            height: 100%;
            background: #7ab0c8;
        }

        #captureContainer .capture-right .trait-row .tbar .r {
            height: 100%;
            background: #e8a86a;
        }

        #captureContainer .capture-right .items-block {
            margin-top: 8px;
            font-size: 0.7rem;
            background: #e8ddd0;
            padding: 6px 12px;
            border: 4px solid #2d2d2d;
        }

        #captureContainer .capture-footer {
            margin-top: 20px;
            text-align: center;
            border-top: 4px solid #2d2d2d;
            padding-top: 16px;
            font-size: 0.8rem;
            color: #666;
        }

        @media (max-width: 760px) {
            .left-panel {
                flex: 1 1 100%;
                aspect-ratio: 16 / 9;
                min-height: 180px;
            }
            .right-panel {
                flex: 1 1 100%;
                max-height: 460px;
            }
            .game-wrapper {
                padding: 8px;
            }
            .game-header .title {
                font-size: 0.75rem;
            }
            #homePage .title-lg {
                font-size: 1.2rem;
            }
            .option-btn {
                font-size: 0.75rem;
                padding: 8px 10px;
            }
            .customize-area {
                flex-direction: column;
                align-items: stretch;
            }
            .customize-group {
                min-width: 60px;
            }
            .trait-bar-row {
                font-size: 0.55rem;
            }
            .item-popup {
                padding: 20px;
                max-width: 320px;
            }
            .item-popup .item-icon {
                font-size: 3rem;
            }
            .item-popup .item-name {
                font-size: 1.2rem;
            }
            #captureContainer {
                width: 600px;
                padding: 16px;
            }
            #captureContainer .capture-inner {
                padding: 16px;
            }
            #captureContainer .capture-body {
                flex-direction: column;
            }
            #captureContainer .capture-left {
                flex: 1 1 100%;
            }
        }

        @media print {
            body {
                background: white;
                padding: 0;
            }
            .game-wrapper {
                box-shadow: none;
                border: 2px solid #000;
                padding: 8px;
            }
            .left-panel {
                display: none;
            }
            .right-panel {
                flex: 1 1 100%;
                max-height: none;
                overflow: visible;
            }
            .pixel-btn {
                display: none;
            }
            .game-header .status {
                display: none;
            }
            .game-header .inventory {
                display: none;
            }
            .result-actions .pixel-btn {
                display: none;
            }
            .option-btn {
                border: 2px solid #000;
                box-shadow: none;
            }
            .option-btn.selected {
                background: #d4e8f5;
            }
            .progress-area {
                display: none;
            }
            .item-popup-overlay {
                display: none !important;
            }
            .costume-unlock {
                display: none;
            }
        }
    </style>
</head>
<body>

    <!-- ===== 主要遊戲容器 ===== -->
    <div class="game-wrapper" id="app">
        <div class="game-header">

                ctx.fillRect(bx + 2 * scale, by + 8 * scale, 4 * scale, 8 * scale);
                ctx.fillRect(bx + 34 * scale, by + 8 * scale, 4 * scale, 8 * scale);
            }
            ctx.fillStyle = '#f5f0e8';
            ctx.fillRect(bx + 10 * scale, by + 6 * scale, 8 * scale, 8 * scale);
            ctx.fillRect(bx + 22 * scale, by + 6 * scale, 8 * scale, 8 * scale);
            ctx.fillStyle = '#1a1a1a';
            const eyeOff = Math.sin(frame * 0.04) * 1.5;
            ctx.fillRect(bx + 12 * scale + eyeOff, by + 8 * scale, 4 * scale, 4 * scale);
            ctx.fillRect(bx + 24 * scale + eyeOff, by + 8 * scale, 4 * scale, 4 * scale);
            ctx.fillStyle = '#c45a5a';
            ctx.fillRect(bx + 14 * scale, by + 16 * scale, 12 * scale, 3 * scale);
            const armSwing = Math.sin(frame * 0.08) * 6 * scale;
            ctx.fillStyle = '#f5d0b0';
            ctx.fillRect(bx - 2 * scale, by + 20 * scale + armSwing, 8 * scale, 14 * scale);
            ctx.fillRect(bx + 34 * scale, by + 20 * scale - armSwing, 8 * scale, 14 * scale);
            const legOff = Math.sin(frame * 0.1) * 4 * scale;
            ctx.fillStyle = '#2d2d2d';
            ctx.fillRect(bx + 8 * scale, by + 54 * scale + legOff, 8 * scale, 10 * scale);
            ctx.fillRect(bx + 24 * scale, by + 54 * scale - legOff, 8 * scale, 10 * scale);
            if (state.page === 'quiz' || state.page === 'home') {
                ctx.fillStyle = '#5a3a2a';
                ctx.fillRect(bx + 28 * scale, by + 20 * scale, 10 * scale, 20 * scale);
                ctx.fillRect(bx + 26 * scale, by + 18 * scale, 14 * scale, 6 * scale);
                ctx.fillStyle = '#4a2a1a';
                ctx.fillRect(bx + 30 * scale, by + 24 * scale, 6 * scale, 12 * scale);
            }
        }

        // ================================================================

        // ================================================================
        function typeWriter(element, text, speed = 50, callback) {
            if (state.isTyping) { clearTimeout(state.typeTimer);
                state.isTyping = false; }
            state.isTyping = true;
            let index = 0;
            element.textContent = '';
            element.style.visibility = 'visible';

            function typeChar() {
                if (index < text.length) {
                    element.textContent += text.charAt(index);
                    index++;
                    rightPanel.scrollTop = rightPanel.scrollHeight;
                    state.typeTimer = setTimeout(typeChar, speed);
                } else {
                    state.isTyping = false;
                    element.innerHTML += '<span class="cursor-blink"></span>';
                    if (callback) callback();
                }
            }
            typeChar();
        }

        function stopTyping() { if (state.typeTimer) { clearTimeout(state.typeTimer);
                state.typeTimer = null; }
            state.isTyping = false; }

                    const ans = state.answers[qi];

                        const scores = ans.scores;
                        if (scores[left]) leftTotal += scores[left];
                        if (scores[right]) rightTotal += scores[right];

                });
                const sum = leftTotal + rightTotal;
                if (sum === 0) { finalScores[left] = 8;

                    finalScores[right] = 16 - finalScores[left]; }

async function uploadAndSavePDF() {
    const submitBtn = document.getElementById('submitReportBtn'); // 請對照你網頁按鈕的 ID
    if (submitBtn) {
        submitBtn.disabled = true;
        submitBtn.textContent = '傳送中...';
    }

    // 1. 確保截圖容器在渲染時是看得到的（避免產出空白或計算錯誤）
    const container = document.getElementById('captureContainer');
    if (!container) {
        alert("找不到截圖容器 #captureContainer！");
        if (submitBtn) { submitBtn.disabled = false; submitBtn.textContent = '遞交'; }
        return;
    }
    
    // 暫時將其重置為一般定位以利 html2canvas 計算長寬
    container.style.position = 'static'; 
    container.style.top = '0';
    container.style.left = '0';

    try {
        // 2. 使用 html2canvas 將內容轉成畫布 (指定抓取內層的 captureInner)
        const innerElement = document.getElementById('captureInner') || container;
        const canvas = await html2canvas(innerElement, {
            useCORS: true,
            scale: 2 // 提升清晰度
        });

        // 渲染完畢，立刻把容器移回去藏起來
        container.style.position = 'fixed';
        container.style.top = '-9999px';
        container.style.left = '-9999px';

        const imgData = canvas.toDataURL('image/png');

        // 3. 建立 jsPDF 物件並置入圖片
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF('p', 'mm', 'a4');
        const imgWidth = 210; // A4 寬度 (mm)
        const pageHeight = 295; // A4 長度 (mm)
        const imgHeight = (canvas.height * imgWidth) / canvas.width;
        
        pdf.addImage(imgData, 'PNG', 0, 0, imgWidth, imgHeight);

        // 4. 將 PDF 轉換為安全傳輸的 Base64 字串
        const pdfBase64 = pdf.output('datauristring').split(',')[1];

        // 5. 打包準備發送給 Apps Script 的 JSON 資料
        const formattedDate = new Date().toISOString().slice(0,10).replace(/-/g,"");
        const pName = (typeof state !== 'undefined' && state.playerName) ? state.playerName : "學生";
        
        const payload = {
            studentName: pName,
            pdfData: pdfBase64,
            fileName: `燕京_${pName}_完整報告_${formattedDate}.pdf`
        };

        // 6. 使用 POST 方法安全發送至 Google Apps Script
        const response = await fetch(GOOGLE_APPS_SCRIPT_URL, {
            method: 'POST',
            mode: 'cors',
            headers: {
                'Content-Type': 'text/plain;charset=utf-8' // 使用 text/plain 可以完美繞過部分瀏覽器的 CORS 預檢攔截
            },
            body: JSON.stringify(payload)
        });

        const result = await response.json();
        
        if (result.status === 'success') {
            alert('🎉 報告已成功遞交並生成 PDF 儲存至 Google Drive！');
            console.log('儲存成功：', result.fileUrl);
        } else {
            alert('❌ 遞交失敗：' + result.message);
        }

    } catch (error) {
        console.error("發生錯誤:", error);
        alert("儲存或上傳時發生系統錯誤，請檢查瀏覽器主控台 (F12)。");
    } finally {
        if (submitBtn) {
            submitBtn.disabled = false;
            submitBtn.textContent = '遞交';
        }
    }
}
        // ================================================================
        //  13. 上傳 PDF 到 Google Drive

        function uploadPdfToDrive(pdfBlob) {
            const formData = new FormData();
            formData.append('file', pdfBlob, `燕京_${state.studentName}_完整報告.pdf`);
            formData.append('name', state.studentName);
            formData.append('timestamp', new Date().toISOString());

            fetch(GOOGLE_APPS_SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: formData,
            }).then(() => {
                alert('✅ PDF 已成功儲存到 Google Drive！');
            }).catch((err) => {
                console.error('上傳失敗:', err);
                alert('⚠️ PDF 上傳失敗，但 PDF 已在本機生成。請檢查網絡連線。');
            });
        }

        // ================================================================
        //  14. 原型配對
        // ================================================================
        function getPrototype(scores) {
            const s = scores;
            const rules = [
                { id: '穩健型學霸', check: () => s.安全感 >= 12 && s.學習力 >= 12 && s.規劃性 >= 12 },
                { id: '冒險型創作者', check: () => s.冒險感 >= 12 && s.創造力 >= 12 && s.隨興性 >= 10 },
                { id: '平衡型協調者', check: () => { const vals = Object.values(s); const avg = vals.reduce((a, b) => a + b,
                        0) / vals.length; return vals.every(v => v >= 5 && v <= 11) && avg >= 6 && avg <= 10; } },
                { id: '保守型跟隨者', check: () => s.安全感 >= 12 && s.顧己 >= 10 && s.家庭為重 >= 10 },
                { id: '衝動型行動派', check: () => s.冒險感 >= 12 && s.隨興性 >= 10 && s.朋友為重 >= 10 },
                { id: '完美型規劃師', check: () => s.規劃性 >= 12 && s.學習力 >= 10 && s.顧己 >= 10 },
                { id: '熱血型助人者', check: () => s.利他 >= 12 && s.冒險感 >= 10 && s.朋友為重 >= 10 },
                { id: '依賴型乖寶寶', check: () => s.安全感 >= 12 && s.家庭為重 >= 12 && s.冒險感 <= 6 },
            ];
            for (let rule of rules) {
                if (rule.check()) {
                    const found = PROTOTYPES.find(p => p.id === rule.id);
                    if (found) return found;
                }
            }
            const sorted = Object.entries(s).sort((a, b) => b[1] - a[1]);
            const top = sorted[0][0];
            const fallbackMap = {
                '安全感': '保守型跟隨者',
                '學習力': '穩健型學霸',
                '規劃性': '完美型規劃師',
                '家庭為重': '依賴型乖寶寶',
                '冒險感': '冒險型創作者',
                '創造力': '冒險型創作者',
                '朋友為重': '衝動型行動派',
                '利他': '熱血型助人者',
                '顧己': '保守型跟隨者',
                '隨興性': '衝動型行動派'
            };
            const fallbackId = fallbackMap[top] || '平衡型協調者';
            return PROTOTYPES.find(p => p.id === fallbackId) || PROTOTYPES[2];
        }

        // ================================================================
        //  15. 重置 & 動畫
        // ================================================================
        function resetAll() {
            state.currentQ = 0;
            state.answers = QUESTIONS.map((q) => ({ qId: q.id, optionIndex: null, scores: {} }));
            state.items = [];
            state.unlockedCostumes = [];
            state.studentName = '';
            state.page = 'home';
            stopTyping();
            if (state.animId) cancelAnimationFrame(state.animId);
            itemDisplay.textContent = '-';
            renderHome();
            headerStatus.textContent = '🏫 中華基督教會燕京書院';
        }

        function animateScene(stage) {
            let frame = 0;

            function tick() {
                frame++;
                state.sceneFrame = frame;
                if (state.isJumping) {
                    state.jumpFrame++;
                    if (state.jumpFrame > 60) {
                        state.isJumping = false;
                        state.jumpFrame = 0;
                    }
                }
                drawScene(stage, frame);
                state.animId = requestAnimationFrame(tick);
            }
            tick();
        }

        // ================================================================
        //  16. 啟動
        // ================================================================
        renderHome();

        document.addEventListener('keydown', (e) => {
            if (e.key === 'r' || e.key === 'R') {
                if (state.page === 'result') {
                    if (confirm('重新測驗？')) resetAll();
                }
            }
        });

        console.log('🎮 燕京生活啟航站 v4.1 已啟動！');
        console.log('📋 共 ' + QUESTIONS.length + ' 條題目，8 種性格原型');
        console.log('📷 支援完整報告截圖 (手機也可用)');
        console.log('💾 Google Apps Script URL 已設定');
        console.log('⌨️ 快捷鍵: 1-4 選項, Enter 下一題, R 重新測驗');
    </script>
