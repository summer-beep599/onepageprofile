<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>人生體驗卡</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DotGothic16&display=swap');

        * {
            box-sizing: border-box;
            font-family: 'DotGothic16', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #2c2520;
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        #game-container {
            width: 100vw;
            height: 100vh;
            max-width: 1120px;
            max-height: 700px;
            display: flex;
            background-color: #3d352e;
            border: 6px solid #1a1512;
            box-shadow: inset 0 0 0 4px #5c4d42, 0 12px 35px rgba(0,0,0,0.7);
            overflow: hidden;
            position: relative;
        }

        /* 左側：動態純 CSS 像素插畫畫布 (42%) */
        .left-panel {
            width: 42%;
            height: 100%;
            position: relative;
            border-right: 6px solid #1a1512;
            overflow: hidden;
            background: #110f0d;
        }

        /* 經典液晶復古濾鏡 */
        .pixel-screen-filter {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(0,0,0,0.12) 50%, rgba(255,255,255,0.02) 50%);
            background-size: 100% 4px;
            z-index: 10;
            pointer-events: none;
        }

        /* 無邊框道具展台 */
        .pixel-sprite-container {
            width: 38%;
            aspect-ratio: 1 / 1;
            background: transparent;
            border: none;
            box-shadow: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            z-index: 20;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
        }
        .pixel-sprite-container.pop-active {
            transform: translate(-50%, -50%) scale(1);
        }

        /* 高清 SVG 像素圖撐滿容器 */
        .sprite-svg-render {
            width: 100%;
            height: 100%;
            image-rendering: pixelated;
            animation: spriteFloat 1.6s steps(4) infinite;
        }

        @keyframes spriteFloat {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }

        /* 右側：對話劇場區 (58%) */
        .right-panel {
            width: 58%;
            height: 100%;
            background: #231e1a;
            padding: 25px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            z-index: 5;
            box-shadow: inset 8px 0px 16px rgba(0,0,0,0.4);
        }

        .header-section {
            flex-shrink: 0;
            border-bottom: 4px dotted #5c4d42;
            padding-bottom: 12px;
            margin-bottom: 15px;
        }

        .age-badge {
            font-size: 2.8rem;
            color: #f39c12;
            text-shadow: 4px 4px 0px #000;
            margin: 0;
        }

        .subtitle {
            font-size: 1.2rem;
            color: #bdc3c7;
            margin-top: 4px;
            margin-bottom: 0;
            letter-spacing: 1px;
        }

        .dialogue-wrapper {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 14px;
            overflow-y: auto;
            padding-right: 5px;
            margin-bottom: 15px;
        }

        .dialogue-wrapper::-webkit-scrollbar { width: 8px; }
        .dialogue-wrapper::-webkit-scrollbar-track { background: #1a1512; }
        .dialogue-wrapper::-webkit-scrollbar-thumb { background: #5c4d42; border: 2px solid #1a1512; }

        .chat-line {
            font-size: 1.3rem;
            line-height: 1.6;
            padding: 14px 18px;
            border: 4px solid #ffffff;
            background: #110f0d;
            box-shadow: 5px 5px 0px #000000;
            animation: pixelPop 0.15s steps(2) forwards;
            flex-shrink: 0;
        }

        @keyframes pixelPop {
            from { transform: scale(0.97); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .line-speaker { border-color: #e67e22; }
        .speaker-tag { color: #e67e22; font-weight: bold; margin-bottom: 6px; font-size: 1.2rem; }

        .line-inner { border-color: #3498db; }
        .inner-tag { color: #3498db; font-weight: bold; margin-bottom: 6px; font-size: 1.2rem; }

        .bottom-action-bar {
            flex-shrink: 0;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 12px;
        }

        .next-hint-btn {
            background: #34495e;
            color: #ffffff;
            border: 4px solid #ffffff;
            box-shadow: 4px 4px 0px #000;
            padding: 14px 26px;
            font-size: 1.25rem;
            cursor: pointer;
        }
        .next-hint-btn:active { transform: translate(3px, 3px); box-shadow: 1px 1px 0px #000; }

        /* 上一頁按鈕樣式 (復古深灰) */
        .back-stage-btn {
            background: #566573;
            color: #ffffff;
            border: 4px solid #1a1512;
            box-shadow: 4px 4px 0px #000;
            padding: 14px 20px;
            font-size: 1.2rem;
            cursor: pointer;
        }
        .back-stage-btn:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0px #000; }
        .back-stage-btn:disabled { background: #2c3539; color: #7f8c8d; cursor: not-allowed; box-shadow: none; transform: none; border-color: #110f0d; }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            margin-top: 8px;
            flex-shrink: 0;
        }

        .pixel-option-btn {
            background: #2c3e50;
            color: #ffffff;
            border: 4px solid #1a1512;
            box-shadow: 4px 4px 0px #000;
            padding: 14px 18px;
            font-size: 1.2rem;
            text-align: left;
            cursor: pointer;
            line-height: 1.5;
            min-height: 58px;
        }
        .pixel-option-btn:active { background: #e67e22; border-color: #ffffff; transform: translate(2px, 2px); box-shadow: 2px 2px 0px #000; }

        /* 全螢幕過渡/大結局層 */
        #end-screen, #transition-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #1a1512;
            z-index: 100;
            padding: 25px 30px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            display: none;
        }

        .transition-title {
            font-size: 3rem;
            color: #f1c40f;
            text-shadow: 5px 5px 0px #000;
            margin-bottom: 20px;
            text-align: center;
            animation: pulse 1.5s infinite steps(4);
        }

        .transition-subtitle {
            font-size: 1.5rem;
            color: #bdc3c7;
            margin-bottom: 30px;
            text-align: center;
            letter-spacing: 2px;
        }

        /* 復古像素姓名輸入框樣式 */
        .pixel-name-input {
            background: #110f0d;
            border: 4px solid #ffffff;
            color: #f1c40f;
            padding: 12px 20px;
            font-size: 1.4rem;
            text-align: center;
            width: 280px;
            margin-bottom: 30px;
            box-shadow: 4px 4px 0px #000;
            outline: none;
        }
        .pixel-name-input::placeholder {
            color: #5c4d42;
        }
        .pixel-name-input:focus {
            border-color: #f39c12;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); color: #f39c12; }
            100% { transform: scale(1); }
        }

        .end-header-wrapper {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-bottom: 15px;
            position: relative;
        }

        .end-title { font-size: 2.4rem; color: #f1c40f; text-shadow: 4px 4px 0px #000; margin: 0; }
        
        /* 結局右上角 Save 按鈕樣式 */
        .pixel-save-btn {
            background: #2ecc71;
            color: #ffffff;
            border: 4px solid #ffffff;
            box-shadow: 4px 4px 0px #000;
            padding: 8px 22px;
            font-size: 1.25rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        .pixel-save-btn:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0px #000; }
        .pixel-save-btn:disabled { background: #27ae60; color: #bdc3c7; cursor: not-allowed; }

        /* 結局佈局區 */
        .end-layout {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            width: 100%;
        }
        
        /* 軟實力面板樣式 */
        .status-panel {
            width: 45%;
            background: #110f0d;
            border: 4px solid #5c4d42;
            padding: 15px;
            box-shadow: 4px 4px 0px #000;
        }
        .status-title { font-size: 1.4rem; color: #3498db; margin-bottom: 15px; border-bottom: 2px dotted #5c4d42; padding-bottom: 5px; }
        .status-row { margin-bottom: 10px; }
        .status-label { font-size: 1.1rem; color: #bdc3c7; display: flex; justify-content: space-between; margin-bottom: 4px; }
        .status-bar-bg { width: 100%; height: 12px; background: #2c3e50; border: 2px solid #000; position: relative; }
        .status-bar-fill { height: 100%; background: #2ecc71; width: 50%; transition: width 0.5s ease; }

        /* 命運報告樣式 */
        .report-panel {
            width: 55%;
            display: flex;
            flex-direction: column;
        }
        .end-report-box { background: #000000; border: 4px solid #ffffff; padding: 18px; font-size: 1.25rem; line-height: 1.7; color: #eceff1; box-shadow: 6px 6px 0px #000; min-height: 255px; flex-grow: 1; cursor: pointer; }
        
        .bag-heading { font-size: 1.5rem; color: #e67e22; margin-bottom: 12px; margin-top: 10px; width: 100%; text-align: left; }
        .bag-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; margin-bottom: 20px; width: 100%; }
        
        .bag-card {
            background: #110f0d;
            border: 3px solid #5c4d42;
            padding: 8px 4px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            box-shadow: 3px 3px 0px #000;
        }
        .bag-card-name { font-size: 0.85rem; color: #f1c40f; margin-top: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; }
        .restart-button { background: #e67e22; color: white; border: 4px solid #ffffff; box-shadow: 5px 5px 0px #000; padding: 12px; font-size: 1.4rem; cursor: pointer; margin-top: auto; width: 100%; }
        
        .scene-svg {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            image-rendering: pixelated;
        }

        /* ========================================================
           需求二：自動調整文字與畫面比例大小 (RWD / 響應式優化)
           ======================================================== */
        @media (max-width: 900px) {
            #game-container {
                flex-direction: column;
                max-height: none;
                height: 100vh;
                border: 4px solid #1a1512;
            }
            .left-panel {
                width: 100%;
                height: 38%;
                border-right: none;
                border-bottom: 6px solid #1a1512;
            }
            .right-panel {
                width: 100%;
                height: 62%;
                padding: 15px;
            }
            .age-badge { font-size: 2rem; }
            .subtitle { font-size: 1rem; }
            .chat-line { font-size: 1.1rem; padding: 10px 14px; }
            .pixel-option-btn { font-size: 1.05rem; padding: 10px 14px; min-height: 48px; }
            .next-hint-btn, .back-stage-btn { padding: 10px 18px; font-size: 1.1rem; }
            
            /* 結局頁面響應式調整 */
            #end-screen { padding: 15px; overflow-y: auto; justify-content: flex-start; }
            .end-header-wrapper { flex-direction: column; gap: 10px; align-items: flex-start; }
            .end-title { font-size: 1.8rem; }
            .pixel-save-btn { width: 100%; text-align: center; }
            .end-layout { flex-direction: column; gap: 15px; }
            .status-panel, .report-panel { width: 100%; }
            .end-report-box { min-height: 180px; font-size: 1.1rem; }
            .bag-grid { grid-template-columns: repeat(4, 1fr); }
            .restart-button { font-size: 1.2rem; padding: 10px; }
        }

        @media (max-width: 480px) {
            .age-badge { font-size: 1.6rem; }
            .chat-line { font-size: 1rem; }
            .pixel-option-btn { font-size: 0.95rem; }
            .bag-grid { grid-template-columns: repeat(3, 1fr); }
            .transition-title { font-size: 2.2rem; }
            .transition-subtitle { font-size: 1.1rem; }
            .pixel-name-input { width: 100%; max-width: 260px; font-size: 1.2rem; }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>

<div id="game-container">

    <div class="left-panel" id="pixel-canvas"></div>

    <div class="right-panel">
        <div class="header-section">
            <div id="age-header" class="age-badge">15 歲</div>
            <div id="sub-header" class="subtitle">LOADING...</div>
        </div>
            
        <div id="dialogue-container" class="dialogue-wrapper"></div>
        <div class="bottom-action-bar" id="action-area"></div>
    </div>

    <div id="transition-screen">
        <div class="transition-title" id="trans-age">⌛ 人生體驗卡</div>
        <div class="transition-subtitle" id="trans-sub">在注入意識前，請刻下你的名字：</div>
        
        <input type="text" id="player-name" class="pixel-name-input" placeholder="[ 輸入你的姓名 ]" maxlength="10">
        
        <button class="next-hint-btn" style="background:#e67e22; padding:16px 40px; font-size:1.4rem;" onclick="validateAndStartGame()">[ 注入意識・開始體驗 ] ➔</button>
    </div>

    <div id="end-screen">
        <div class="end-header-wrapper">
            <div class="end-title" id="end-title-text">⌛ 24 歲的人生通關樣貌</div>
            <button id="save-drive-btn" class="pixel-save-btn" onclick="captureAndUploadToDrive()">💾 Save</button>
        </div>
        
        <div class="end-layout">
            <div class="status-panel">
                <div class="status-title">📊 靈魂軟實力面板</div>
                <div id="status-bars-container"></div>
            </div>
            
            <div class="report-panel">
                <div id="final-report" class="end-report-box">正在讀取你的靈魂特質...</div>
            </div>
        </div>

        <div class="bag-heading">🎒 時光背包（人生抉擇衍生之物）</div>
        <div id="inventory-container" class="bag-grid"></div>
        <button class="restart-button" onclick="location.reload()">[ 重新注入體驗卡 ]</button>
    </div>

</div>

<script>
    let scores = { responsibility: 10, selfLove: 10, learning: 10, bravery: 10, confidence: 10, honesty: 10, thoughtful: 10 };
    let bag = [];
    let currentStageIndex = 0;
    let typewriterTimer = null;
    let currentTypingResolver = null;
    let historyStack = [];
    let playerName = ""; // 儲存玩家姓名

    // 21款高清像素道具 SVG 庫
    const pixelItemSVGs = {

        aiChip: `<svg viewBox="0 0 16 16" class="sprite-svg-render"><path d="M3,3 h10 v10 h-10 z" fill="#111"/><path d="M4,4 h8 v8 h-8 z" fill="#2c3e50"/><rect x="6" y="6" width="4" height="4" fill="#1abc9c"/><line x1="5" y1="2" x2="5" y2="14" stroke="#f1c40f" stroke-dasharray="2,2"/><line x1="11" y1="2" x2="11" y2="14" stroke="#f1c40f" stroke-dasharray="2,2"/></svg>`,

        crossBadge: `<svg viewBox="0 0 16 16" class="sprite-svg-render"><path d="M4,2 h8 l2,4 l-6,8 l-6,-8 z" fill="#111"/><path d="M5,3 h6 l1.5,3 l-4.5,6 l-4.5,-6 z" fill="#f1c40f"/><path d="M7,4 h2 v5 h-2 z M6,5 h4 v2 h-4 z" fill="#e74c3c"/></svg>`,
        cloak: `<svg viewBox="0 0 16 16" class="sprite-svg-render"><path d="M4,3 h8 v2 l2,7 h-12 l2,-7 z" fill="#111"/><path d="M5,4 h6 v1 l1,6 h-8 l1,-6 z" fill="#34495e"/><path d="M6,4 h4 v2 h-4 z" fill="#1a252f"/><circle cx="8" cy="5" r="1" fill="#e74c3c"/></svg>`,

                { text: "B. 「真係好對唔住，我呢個週末屋企有非常重要嘅家族約定，幫唔到手。」", effects: { responsibility: 3, thoughtful: -1 }, feedback: "你週末選擇了對家人的承諾，穩穩守護了神記的親情與個人生活的邊界。", item: { styleKey: "goldLock", name: "家族守護黃金鎖" } },
                { text: "C. (兩邊都騙)「我啱啱接到醫院通知，我身體嚴重不適，週末要住院留醫。」", effects: { selfLove: 1, responsibility: -3, honesty: -3 }, feedback: "你逃避了所有人的期待。切斷連線的電話背後，剩下的是長久揮之不記的寂靜與自責。", item: { styleKey: "brokenPhone", name: "斷線的灰色電話" } }
            ]
        }
    ];

    const textTemplates = {
        high: {
            responsibility: "【極具擔當的靠譜領袖】24 歲的你，在群體與承諾面前選擇了硬撐與守護。你是旁人眼中絕不食言的終極防線，大家都極度信任你。",
            selfLove: "【清醒獨立的悅己行者】24 歲的你，多次在外界高壓下優先關照自己的身心。你拒絕被道德綁架，非常清楚極限在哪，精神韌性極高。",
            learning: "【與時俱進的破局智者】24 歲的你，對未知領域展現出極強的死磕精神。你從不害怕推翻過去的自己，這讓你擁有野蠻的生長力。",
            bravery: "【無畏風浪的破風勇士】24 歲的你，擁有直面黑暗與質疑的驚人膽識。你敢於打破常規、為正義發聲，胸膛裡跳動著一顆熱血的心。",
            confidence: "【光芒萬丈的內核主宰】24 歲的你，建立起了堅不可摧的自我認同。不論旁人如何冷嘲熱諷，你依然堅信自己的價值與選擇。",
            honesty: "【晶瑩剔透的純粹靈魂】24 歲的你，視真誠為人生的最高準則。即使面對尷尬的職場與利益，你依然選擇直言，換來了至高無上的信任。",
            thoughtful: "【療癒萬物的溫柔燈塔】24 歲的你，擁有極其敏銳的情感共鳴。你總能在別人的傷口或絕望處默默提供支撐，是所有人脆弱時的避風港。"
        },
        low: {
            responsibility: "不過，因為你在部分關鍵決策中選擇了自我保護或逃避，導致你的【責任感】偏低，關鍵時刻會給人一種隨時可能找不到人的疏離感。",
            selfLove: "然而，你太習慣透過燃燒自己的健康與精力來滿足他人的期待。這導致你的【自愛度】嚴重透支，在照亮別人的同時，你的內心已經非常疲憊。",
            learning: "可惜的是，你曾多次為了留在安全的常規航道而拒絕了新知識與變革的洗禮，這使你的【學習力】偏向保守，未來需要試著勇敢打破習慣的舒適圈。",
            bravery: "遺憾的是，在面對走廊的陰暗或未知的巨浪時，你多次選擇了低頭快步走過。這讓你的【勇敢度】稍顯不足，心裡偶爾會留下不敢站出來的微小遺憾。",
            confidence: "另外，你過去的自信心曾在現實的打擊與謊言下碎裂。你的【自信心】在結算時偏低，這讓你在面對重大機遇時，容易陷入自我懷疑的內耗泥潭。",
            honesty: "但要留意的是，你為了面子或逃避責任，在某些時刻戴上了偽裝的面具或說了謊。這使你的【誠實度】偏低，內心常伴隨隨時被揭穿的巨大焦慮。",
            thoughtful: "然而，有時你過於專注在前途或自我防禦上，在不知不覺中忽略了身邊人的求救與感受。這使你的【體貼度】偏低，在旁人眼裡顯得有些冷漠。"
        },
        zhLabels: {
            responsibility: "✊ 責任感 (Responsibility)",
            selfLove: "❤️ 自愛度 (Self-Love)",
            learning: "🧠 學習力 (Learning)",
            bravery: "🔥 勇敢度 (Bravery)",
            confidence: "✨ 自信心 (Confidence)",
            honesty: "💎 誠實度 (Honesty)",
            thoughtful: "🕊️ 體貼度 (Thoughtful)"
        }
    };

    function runTypewriter(element, text, speed = 50) {
        if (typewriterTimer) clearInterval(typewriterTimer);
        element.innerText = '';
        let index = 0;
        
        return new Promise((resolve) => {
            currentTypingResolver = () => {
                clearInterval(typewriterTimer);
                element.innerText = text;
                resolve();
            };
            typewriterTimer = setInterval(() => {
                if (index < text.length) {
                    element.innerText += text.charAt(index);
                    index++;
                    let container = document.getElementById('dialogue-container');
                    if(container) container.scrollTop = container.scrollHeight;
                } else {
                    clearInterval(typewriterTimer);
                    resolve();
                }
            }, speed);
        });
    }

    async function runOptionsTypewriter(buttons, index = 0) {
        if (index >= buttons.length) {
            currentTypingResolver = null;
            return;
        }

        let btn = buttons[index];
        let fullText = btn.getAttribute('data-text');
        btn.style.opacity = '1';

        await runTypewriter(btn, fullText, 50);
        await runOptionsTypewriter(buttons, index + 1);
    }

    function initGame() {
        scores = { responsibility: 10, selfLove: 10, learning: 10, bravery: 10, confidence: 10, honesty: 10, thoughtful: 10 };
        bag = [];
        historyStack = [];
        currentStageIndex = 0;
        
        // 初始化時，首先展現首頁姓名輸入框
        document.getElementById('transition-screen').style.display = 'flex';
    }

    // 需求一：檢查是否有填寫名字，必須填寫才可以開始
    function validateAndStartGame() {
        const input = document.getElementById('player-name');
        const name = input.value.trim();
        
        if (!name) {
            alert("「命運齒輪需要引導者，請先輸入您的名字才可以開始體驗！」");
            input.focus();
            return;
        }
        
        playerName = name; // 綁定全域姓名
        exitTransitionScreen(); // 正式進入遊戲
    }

    function loadTransitionScreen() {
        if (typewriterTimer) clearInterval(typewriterTimer);
        currentTypingResolver = null;

        let stage = stages[currentStageIndex];
        
        // 隱藏姓名輸入框，將其改造成純過渡頁面
        document.getElementById('player-name').style.display = 'none';
        
        // 修改按鈕行為，讓它直接進入關卡
        const actionBtn = document.querySelector('#transition-screen .next-hint-btn');
        actionBtn.setAttribute('onclick', 'exitTransitionScreen()');
        actionBtn.innerText = "[ 注入意識・開始體驗 ] ➔";

        document.getElementById('trans-age').innerText = `⏳ ${stage.age}`;
        document.getElementById('trans-sub').innerText = `${playerName}，你即將以【${stage.age}】的身份，去面臨新的人生抉擇...`;
        document.getElementById('transition-screen').style.display = 'flex';
    }

    function exitTransitionScreen() {
        document.getElementById('transition-screen').style.display = 'none';
        loadStagePart1();
    }

    async function loadStagePart1() {
        let canvas = document.getElementById('pixel-canvas');
        canvas.innerHTML = backgroundTemplates[currentStageIndex] + `
            <div class="pixel-screen-filter"></div>
            <div class="pixel-sprite-container" id="sprite-box"></div>
        `;

        let stage = stages[currentStageIndex];
        document.getElementById('age-header').innerText = stage.age;
        document.getElementById('sub-header').innerText = stage.subtitle;

        let container = document.getElementById('dialogue-container');
        container.innerHTML = `
            <div class="chat-line line-speaker">
                <div class="speaker-tag">${stage.speaker}</div>
                <span id="type-p1"></span>
            </div>
        `;

        let backDisabled = (historyStack.length === 0) ? 'disabled' : '';
        document.getElementById('action-area').innerHTML = `
            <button class="back-stage-btn" onclick="popHistoryState()" ${backDisabled}>◁ [ 上一頁 ]</button>
            <button class="next-hint-btn" onclick="skipOrNextPart1()">[ 聆聽內心 ] ➔</button>
        `;
        
        await runTypewriter(document.getElementById('type-p1'), stage.p1_text, 50);
        currentTypingResolver = null;
    }

    function skipOrNextPart1() {
        if (currentTypingResolver) {
            currentTypingResolver();
            currentTypingResolver = null;
        } else {
            loadStagePart2();
        }
    }

    async function loadStagePart2() {
        let stage = stages[currentStageIndex];
        let container = document.getElementById('dialogue-container');
        
        if (!document.getElementById('type-p2')) {
            container.innerHTML += `
                <div class="chat-line line-inner">
                    <div class="inner-tag">${playerName} (內心獨白)：</div>
                    <span id="type-p2"></span>
                </div>
            `;
        }

        let backDisabled = (historyStack.length === 0) ? 'disabled' : '';
        document.getElementById('action-area').innerHTML = `
            <button class="back-stage-btn" onclick="popHistoryState()" ${backDisabled}>◁ [ 上一頁 ]</button>
            <button class="next-hint-btn" style="background:#e67e22;" onclick="skipOrNextPart2()">[ 做出抉擇 ] ➔</button>
        `;
        
        await runTypewriter(document.getElementById('type-p2'), stage.p2_text, 50);
        currentTypingResolver = null;
    }

    function skipOrNextPart2() {
        if (currentTypingResolver) {
            currentTypingResolver();
            currentTypingResolver = null;
        } else {
            loadStageChoice();
        }
    }

    function loadStageChoice() {
        let stage = stages[currentStageIndex];
        let container = document.getElementById('dialogue-container');
        
        let backDisabled = (historyStack.length === 0) ? 'disabled' : '';
        document.getElementById('action-area').innerHTML = `
            <button class="back-stage-btn" onclick="popHistoryState()" ${backDisabled}>◁ [ 上一頁 ]</button>
            <button class="next-hint-btn" style="background:#7f8c8d;" onclick="skipOptionsTyping()">[ 顯示全部選項 ]</button>
        `; 

        let optionsContainer = document.createElement('div');
        optionsContainer.className = 'options-container';

        stage.options.forEach((opt, idx) => {
            let btn = document.createElement('button');
            btn.className = 'pixel-option-btn';
            btn.setAttribute('data-text', opt.text);
            btn.style.opacity = '0';
            btn.onclick = () => {
                if (!currentTypingResolver) {
                    executeChoice(idx);
                }
            };
            optionsContainer.appendChild(btn);
        });

        container.appendChild(optionsContainer);
        setTimeout(() => { container.scrollTo({ top: container.scrollHeight, behavior: 'smooth' }); }, 60);

        let buttons = optionsContainer.querySelectorAll('.pixel-option-btn');
        
        currentTypingResolver = () => {
            clearInterval(typewriterTimer);
            buttons.forEach(btn => {
                btn.style.opacity = '1';
                btn.innerText = btn.getAttribute('data-text');
            });
            document.getElementById('action-area').innerHTML = `
                <button class="back-stage-btn" onclick="popHistoryState()" ${backDisabled}>◁ [ 上一頁 ]</button>
            `;
            currentTypingResolver = null;
        };

        runOptionsTypewriter(buttons, 0);
    }

    function skipOptionsTyping() {
        if (currentTypingResolver) {
            currentTypingResolver();
        }
    }

    async function executeChoice(idx) {
        pushHistoryState();

        let stage = stages[currentStageIndex];
        let choice = stage.options[idx];

        for (let attr in choice.effects) { scores[attr] += choice.effects[attr]; }
        bag.push(choice.item);

        let box = document.getElementById('sprite-box');
        box.innerHTML = pixelItemSVGs[choice.item.styleKey];
        box.classList.add('pop-active');

        document.getElementById('age-header').innerText = "🎒 命運反饋";
        document.getElementById('sub-header').innerText = `生成道具：【${choice.item.name}】`;
        
        let container = document.getElementById('dialogue-container');
        container.innerHTML = `
            <div class="chat-line" style="border-color: #f1c40f; background: #110f0d;">
                <span style="color:#f1c40f; font-weight:bold; font-size:1.3rem;">[ 命運凝結：${choice.item.name} ]</span><br><br>
                <span id="type-feedback"></span>
            </div>
        `;

        let isLast = (currentStageIndex === stages.length - 1);
        let btnText = isLast ? "[ 觀看人生結局 ] ➔" : "[ 前進下一階段 ] ➔";
        
        document.getElementById('action-area').innerHTML = `
            <button class="back-stage-btn" onclick="popHistoryState()">◁ [ 上一頁 ]</button>
            <button class="next-hint-btn" style="background:#27ae60;" onclick="skipOrAdvance()"> ${btnText}</button>
        `;
    
        await runTypewriter(document.getElementById('type-feedback'), choice.feedback, 50);
        currentTypingResolver = null;
    }

    function pushHistoryState() {
        historyStack.push({
            stageIndex: currentStageIndex,
            scores: JSON.parse(JSON.stringify(scores)),
            bag: JSON.parse(JSON.stringify(bag))
        });
    }

    function popHistoryState() {
        if (historyStack.length === 0) return;
        
        if (typewriterTimer) clearInterval(typewriterTimer);
        currentTypingResolver = null;

        let prevState = historyStack.pop();
        currentStageIndex = prevState.stageIndex;
        scores = prevState.scores;
        bag = prevState.bag;

        loadTransitionScreen();
    }

    function skipOrAdvance() {
        if (currentTypingResolver) {
            currentTypingResolver();
            currentTypingResolver = null;
        } else {
            advance();
        }
    }

    function advance() {
        currentStageIndex++;
        if (currentStageIndex < stages.length) {
            loadTransitionScreen(); 
        } else {
            showEndReport();
        }
    }

    async function showEndReport() {
        document.getElementById('end-screen').style.display = 'block';
        document.getElementById('end-title-text').innerText = `⌛ ${playerName} 的 24 歲人生通關樣貌`;

        let barsContainer = document.getElementById('status-bars-container');
        barsContainer.innerHTML = '';
        
        for (let key in scores) {
            let percentage = Math.min(Math.max((scores[key] / 19) * 100, 15), 100);
            let row = document.createElement('div');
            row.className = 'status-row';
            row.innerHTML = `
                <div class="status-label">
                    <span>${textTemplates.zhLabels[key]}</span>
                    <span style="color:#2ecc71; font-weight:bold;">${scores[key]} PT</span>
                </div>
                <div class="status-bar-bg">
                    <div class="status-bar-fill" style="width: ${percentage}%"></div>
                </div>
            `;
            barsContainer.appendChild(row);
        }

        let maxAttr = '', minAttr = '';
        let maxVal = -999, minVal = 999;
        
        let allKeys = Object.keys(scores);
        allKeys.forEach(key => {
            if (scores[key] > maxVal) { maxVal = scores[key]; maxAttr = key; }
            if (scores[key] <= minVal) { minVal = scores[key]; minAttr = key; }
        });
        if (maxAttr === minAttr) { minAttr = allKeys.find(k => k !== maxAttr); }

        let reportText = `【因果解密：你如何成為了今天的你？】\\n\\n每一幅被你收入行囊的像素道具，都是你靈魂分裂出的紀念品。\\n\\n` + textTemplates.high[maxAttr] + `\\n\\n` + textTemplates.low[minAttr] + `\\n\\n回頭看看你的軟實力面板，這就是你一路上用無數次「拒絕」與「承諾」親手捏塑出的、獨一無二的自己。`;
        
        let reportBox = document.getElementById('final-report');
        reportBox.innerHTML = `<span id="type-final"></span>`;

        let bagGrid = document.getElementById('inventory-container');
        bagGrid.innerHTML = '';
        bag.forEach(item => {
            let card = document.createElement('div');
            card.className = 'bag-card';
            card.innerHTML = `
                <div style="width:32px; height:32px; display:flex; justify-content:center; align-items:center;">
                    ${pixelItemSVGs[item.styleKey]}
                </div>
                <div class="bag-card-name" title="${item.name}">${item.name}</div>
            `;
            bagGrid.appendChild(card);
        });

        reportBox.onclick = () => {
            if (currentTypingResolver) {
                currentTypingResolver();
                currentTypingResolver = null;
            }
        };

        await runTypewriter(document.getElementById('type-final'), reportText, 70);
        currentTypingResolver = null;
    }

    // ========================================================
    // 需求三：最後一頁按下 Save 按鈕自動儲存照片到雲端 (GAS Bridge)
    // ========================================================
    function captureAndUploadToDrive() {
        const saveBtn = document.getElementById('save-drive-btn');
        const originalText = saveBtn.innerText;
        
        saveBtn.innerText = "⏳ Saving...";
        saveBtn.disabled = true;

        // 目標：整個結局彈出畫面
        const endScreen = document.getElementById('end-screen');
        
        // 使用 html2canvas 進行畫面算圖渲染
        html2canvas(endScreen, {
            backgroundColor: '#1a1512', // 保持深色背景色
            useCORS: true,
            scale: 2 // 提升截圖清晰度
        }).then(canvas => {
            // 轉為 Base64 字串
            const base64Image = canvas.toDataURL('image/png').split(',')[1];
            
            // 💡 請在這裡替換成您在步驟一中部署成功的 Google Apps Script 網頁應用程式 URL
            const gasUrl = 'https://script.google.com/macros/s/AKfycbykJDMr693fxU7EWgYWVThJ6QNV8dSiJyo0uuOKQmNO73DwUxxgEaa0EyXGguI4EFSNjQ/exec'; 
            
            if (gasUrl === 'https://script.google.com/macros/s/AKfycbyc1J7GtBymosZt7UNh96Xoj783xLm4b3rSL0JpUSq3n1MP97Nl5ZOllG9TDvdUyNrpnQ/exec') {
                alert('https://script.google.com/macros/s/AKfycbykJDMr693fxU7EWgYWVThJ6QNV8dSiJyo0uuOKQmNO73DwUxxgEaa0EyXGguI4EFSNjQ/exec');
                saveBtn.innerText = originalText;
                saveBtn.disabled = false;
                return;
            }

            const payload = {
                image: base64Image,
                fileName: "人生體驗卡_" + playerName + "_" + new Date().getTime() + ".png"
            };

            // 利用 AJAX POST 傳送封包
            fetch(gasUrl, {
                method: 'POST',
                body: JSON.stringify(payload)
            })
            .then(response => response.json())
            .then(result => {
                if (result.success) {
                    saveBtn.innerText = "✅ Saved";
                    alert("恭喜！通關照片已完美存入您的 Google Drive 根目錄！");
                } else {
                    throw new Error(result.error || '儲存失敗');
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('儲存至雲端時發生錯誤：' + error.message);
                saveBtn.innerText = "❌ Retry";
                saveBtn.disabled = false;
            });
        });
    }

    window.onload = initGame;
</script>
